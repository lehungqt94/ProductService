name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: mvn clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t hunglq/product-app:${{ github.sha }} .
          docker tag hunglq/product-app:${{ github.sha }} \
                     hunglq/product-app:latest

      - name: Push image to DockerHub
        run: |
          docker push hunglq/product-app:${{ github.sha }}
          docker push hunglq/product-app:latest
      - name: Update manifest repo
        run: |
          git clone https://${{ secrets.MANIFEST_REPO_TOKEN }}@git@github.com:lehungqt94/ProductGitops.git
          cd /ProductGitOps/src/configure
          sed -i "s|image:.*|image: hunglq/product-app:${{ github.sha }}|" product-deployment.yaml
          git config user.email "ci@github.com"
          git config user.name "github-actions"
          git commit -am "Update image tag"
          git push